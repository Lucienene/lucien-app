<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lucien</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --f: 'DM Sans', sans-serif;
  --m: 'DM Mono', monospace;
  --bg: #1c1830;
  --bg1: #231f3a;
  --bg2: #2c2748;
  --bg3: #373059;
  --bg4: #443a6a;
  --bd: rgba(167,139,250,.14);
  --bd2: rgba(167,139,250,.26);
  --dv: rgba(255,255,255,.06);
  --t: #f0ecff;
  --t2: #b0a4cc;
  --mu: #7a6da0;
  --a: #8b5cf6;
  --a2: #a78bfa;
  --a3: #c4b5fd;
  --gl: rgba(167,139,250,.14);
  --gr: #34d399;
  --re: #f87171;
  --or: #fbbf24;
}
body.light {
  --bg: #f4f1ff;
  --bg1: #ece8ff;
  --bg2: #fff;
  --bg3: #ede9ff;
  --bg4: #ddd7f5;
  --bd: rgba(139,92,246,.14);
  --bd2: rgba(139,92,246,.25);
  --dv: rgba(0,0,0,.06);
  --t: #1a1030;
  --t2: #4a3d70;
  --mu: #9585b8;
  --gl: rgba(139,92,246,.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
html, body {
  height: 100dvh;
  min-height: -webkit-fill-available;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: var(--bg);
  font-family: var(--f);
  color: var(--t);
}
#app {
  height: 100dvh;
  min-height: -webkit-fill-available;
  width: 100%;
  max-width: 430px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  overflow: hidden;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.sc { display: none; flex-direction: column; flex: 1; overflow: hidden; position: relative; z-index: 1; }
.sc.active { display: flex; }
.sv {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: calc(120px + env(safe-area-inset-bottom, 0px));
}
.sv::-webkit-scrollbar { display: none; }

#tb {
  background: var(--bg1);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--bd);
  display: flex;
  padding: 12px 0;
  padding-bottom: calc(20px + env(safe-area-inset-bottom, 34px));
  flex-shrink: 0;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 430px;
  margin: 0 auto;
  z-index: 1000;
  box-sizing: border-box;
}
.tb {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 6px 0;
}
.tw {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s;
}
.tb.active .tw { background: rgba(139,92,246,.18); }
.tb .tl {
  font-size: 11px;
  color: var(--mu);
  font-weight: 600;
  font-family: var(--m);
  letter-spacing: .02em;
  transition: color .2s;
}
.tb.active .tl { color: var(--a2); }

/* === Einheitliche Header-Höhe === */
.uniform-header {
  padding: calc(56px + env(safe-area-inset-top, 0px)) 20px 24px;
  text-align: left;
}
.uniform-subtitle {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--mu);
  margin-bottom: 8px;
  font-family: var(--m);
}
.uniform-title {
  font-size: 34px;
  font-weight: 800;
  letter-spacing: -1.2px;
  line-height: 1.1;
  color: var(--t);
}
.uniform-title span {
  background: linear-gradient(135deg, var(--a2), var(--a3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Restliche Styles (fast 1:1 wie vorher, nur kleine Optimierungen) */
.ab{margin:0 16px 16px;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.18);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer}
.qp{margin:0 16px 20px;background:var(--bg2);border:1px solid var(--bd2);border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer}
.sl{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--mu);padding:0 20px 12px;font-family:var(--m)}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 16px;margin-bottom:24px}
.sh{background:var(--bg2);border:1px solid var(--bd);border-radius:16px;padding:18px;cursor:pointer;display:flex;flex-direction:column;gap:14px;transition:all .15s;aspect-ratio:1.35/1}
.si{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center}
.sn{font-size:16px;font-weight:700;color:var(--t)}
.ch-header{width:100%;display:flex;justify-content:space-between;align-items:center}
.ct{font-size:22px;font-weight:800;color:var(--t)}
.pr{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
.pi{padding:8px 16px;border-radius:24px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .15s}
.pi.active{background:rgba(139,92,246,.25);border-color:var(--a2);color:var(--a3)}
#msgs{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:12px 18px;border-radius:20px;font-size:15.5px;line-height:1.55}
.mu2{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;align-self:flex-end;border-bottom-right-radius:6px}
.mc{background:var(--bg2);border:1px solid var(--bd);color:var(--t);align-self:flex-start;border-bottom-left-radius:6px}
.ia{background:var(--bg1);backdrop-filter:blur(24px);border-top:1px solid var(--bd);padding:14px 18px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));flex-shrink:0}
.ir{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--bd2);border-radius:28px;padding:10px 12px}
#ci{flex:1;font-size:16px;background:transparent;border:none;outline:none;resize:none;max-height:160px;line-height:1.5}
.ib{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:transform .1s}
.ib:active{transform:scale(.92)}
.is{background:var(--a);box-shadow:0 4px 18px rgba(139,92,246,.45)}
.sh2{padding:calc(56px + env(safe-area-inset-top,0px)) 20px 24px;border-bottom:1px solid var(--bd)}
.st2{font-size:30px;font-weight:800;letter-spacing:-1px}
</style>
</head>
<body class="light">
<div id="app">
<div id="home-screen" class="sc active">
<div class="sv">
  <div class="uniform-header">
    <div class="uniform-subtitle">GUTEN TAG</div>
    <div class="uniform-title">Was soll ich<br><span>heute erledigen?</span></div>
  </div>
  <div class="ab" id="api-banner" onclick="showApi()">
    <div class="ad"></div>
    <div style="flex:1"><div class="at">API Key einrichten</div><div class="as">Tippe hier um loszulegen</div></div>
    <svg width="6" height="10" viewBox="0 0 6 11" fill="none"><path d="M1 1l4 4.5L1 10" stroke="var(--mu)" stroke-width="1.5" stroke-linecap="round"/></svg>
  </div>
  <div class="qp" onclick="goChat()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--mu)" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <span class="qt">Frag mich etwas…</span>
    <svg width="6" height="10" viewBox="0 0 6 11" fill="none"><path d="M1 1l4 4.5L1 10" stroke="var(--mu)" stroke-width="1.5"/></svg>
  </div>
  <div class="sl">AKTIONEN</div>
  <div class="sg">
    <!-- deine Aktionen wie vorher -->
    <div class="sh sp" onclick="go('chat')"><div class="si"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--a2)" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div class="sn">Chat</div></div>
    <div class="sh st" onclick="go('email')"><div class="si"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gr)" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg></div><div class="sn">E-Mail</div></div>
    <!-- ... die anderen 4 Aktionen bleiben genau gleich wie in deiner Version ... -->
  </div>
  <div class="sl">ZULETZT</div>
  <div class="rw" id="rl"></div>
</div>
</div>

<!-- Chat-Screen, Settings-Screen, Modals und der REST bleiben 1:1 wie in deiner Originalversion -->

<!-- Toolbar -->
<div id="tb">
  <button class="tb active" onclick="tab('home')" id="tab-home"><div class="tw"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--a2)" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg></div><span class="tl" style="color:var(--a2)">Home</span></button>
  <button class="tb" onclick="tab('chat')" id="tab-chat"><div class="tw"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--mu)" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><span class="tl">Chat</span></button>
  <button class="tb" onclick="tab('settings')" id="tab-settings"><div class="tw"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--mu)" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div><span class="tl">Einstellungen</span></button>
</div>

<!-- Modals, Toast, Script – bleiben 1:1 wie in deiner Originalversion -->

</div>
</body>
</html>
